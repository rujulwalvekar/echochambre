{% extends "base.html" %}

{% block content %}
<div x-data="brainViewer()"
    class="fixed inset-0 bg-gradient-to-b from-[#0f172a] to-[#1e293b] text-white overflow-y-auto">

    <!-- Header -->
    <header class="flex items-center justify-between p-6 pb-0 mb-8">
        <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Back
        </a>
        <h1 class="text-2xl font-bold flex items-center gap-3">
            <i data-lucide="brain" class="w-7 h-7 text-accent"></i>
            The Brain
        </h1>
        <button @click="refreshData()" class="p-2 text-slate-400 hover:text-white transition">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- Tabs -->
    <div class="px-6">
        <div class="flex gap-4 mb-8 border-b border-white/10 pb-4">
            <button @click="activeTab = 'entries'" class="px-4 py-2 rounded-lg font-medium transition"
                :class="activeTab === 'entries' ? 'bg-accent text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10'">
                <i data-lucide="database" class="w-4 h-4 inline mr-2"></i>
                Entries (<span x-text="entries.length"></span>)
            </button>
            <button @click="activeTab = 'profile'" class="px-4 py-2 rounded-lg font-medium transition"
                :class="activeTab === 'profile' ? 'bg-accent text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10'">
                <i data-lucide="user-circle" class="w-4 h-4 inline mr-2"></i>
                User Profile
            </button>
        </div>
    </div>

    <!-- Content Area -->
    <div class="px-6 pb-6">

        <!-- Entries Tab -->
        <div x-show="activeTab === 'entries'" x-transition class="space-y-4">
            <template x-for="entry in entries" :key="entry.id">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 hover:bg-white/10 transition">
                    <div class="flex items-start justify-between mb-3">
                        <span class="px-3 py-1 rounded-full text-xs font-bold"
                            :class="entry.type === 'ANCHOR' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'">
                            <span x-text="entry.type === 'ANCHOR' ? '⚓️ ANCHOR' : '📔 JOURNAL'"></span>
                        </span>
                        <span class="text-xs text-slate-500" x-text="entry.created_at"></span>
                    </div>
                    <p class="text-slate-200 mb-4" x-text="entry.content"></p>

                    <!-- Metadata -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs"
                        x-show="entry.metadata && Object.keys(entry.metadata).length > 0">
                        <div class="bg-white/5 rounded-lg p-2"
                            x-show="entry.metadata.people && entry.metadata.people.length">
                            <span class="text-slate-500 block mb-1">People</span>
                            <span class="text-white" x-text="entry.metadata.people?.join(', ') || '-'"></span>
                        </div>
                        <div class="bg-white/5 rounded-lg p-2"
                            x-show="entry.metadata.emotions && entry.metadata.emotions.length">
                            <span class="text-slate-500 block mb-1">Emotions</span>
                            <span class="text-white" x-text="entry.metadata.emotions?.join(', ') || '-'"></span>
                        </div>
                        <div class="bg-white/5 rounded-lg p-2 col-span-2" x-show="entry.metadata.problem">
                            <span class="text-slate-500 block mb-1">Problem</span>
                            <span class="text-white" x-text="entry.metadata.problem || '-'"></span>
                        </div>
                    </div>
                </div>
            </template>

            <div x-show="entries.length === 0" class="text-center py-12 text-slate-500">
                No entries yet. Use Voice mode to add some!
            </div>
        </div>

        <!-- Profile Tab -->
        <div x-show="activeTab === 'profile'" x-transition class="space-y-6">

            <!-- Thinking Patterns -->
            <div class="bg-white/5 border border-white/10 rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="brain-circuit" class="w-5 h-5 text-purple-400"></i>
                    Thinking Patterns
                </h3>
                <ul class="space-y-2">
                    <template x-for="pattern in profile.thinking_patterns || []" :key="pattern">
                        <li class="flex items-start gap-3 text-slate-300">
                            <span class="text-purple-400 mt-1">•</span>
                            <span x-text="pattern"></span>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Core Values -->
            <div class="bg-white/5 border border-white/10 rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="heart" class="w-5 h-5 text-red-400"></i>
                    Core Values
                </h3>
                <div class="flex flex-wrap gap-2">
                    <template x-for="value in profile.core_values || []" :key="value">
                        <span class="px-3 py-1 bg-red-500/20 text-red-300 rounded-full text-sm" x-text="value"></span>
                    </template>
                </div>
            </div>

            <!-- Key People -->
            <div class="bg-white/5 border border-white/10 rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="users" class="w-5 h-5 text-blue-400"></i>
                    Relationship Dynamics
                </h3>
                <div class="space-y-4">
                    <template
                        x-for="(dynamic, name) in (Array.isArray(profile.people) ? Object.fromEntries(profile.people.map(p => [p.name, p.dynamic])) : profile.people) || {}"
                        :key="name">
                        <div class="bg-white/5 rounded-lg p-4">
                            <div class="font-bold text-white" x-text="name"></div>
                            <div class="text-sm text-slate-400 mt-1" x-text="dynamic"></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Communication Style -->
            <div class="bg-white/5 border border-white/10 rounded-xl p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="message-circle" class="w-5 h-5 text-green-400"></i>
                    Communication Style
                </h3>
                <ul class="space-y-2">
                    <template
                        x-for="style in (Array.isArray(profile.communication_style) ? profile.communication_style : [profile.communication_style]) || []"
                        :key="style">
                        <li class="flex items-start gap-3 text-slate-300">
                            <span class="text-green-400 mt-1">•</span>
                            <span x-text="style"></span>
                        </li>
                    </template>
                </ul>
            </div>
        </div>

    </div>

    <script>
        function brainViewer() {
            return {
                activeTab: 'entries',
                entries: [],
                profile: {},

                async init() {
                    await this.refreshData();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                async refreshData() {
                    try {
                        const res = await fetch('/api/brain');
                        const data = await res.json();
                        this.entries = data.entries || [];
                        this.profile = data.profile || {};
                    } catch (err) {
                        console.error('Failed to load brain data:', err);
                    }
                }
            }
        }
    </script>
    {% endblock %}
